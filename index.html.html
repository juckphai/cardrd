<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>อ่านบัตรประชาชน</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>📇 อ่านบัตรประชาชน</h1>
    
    <button id="readBtn" onclick="readCard()">
      📖 อ่านบัตร
    </button>
    
    <div id="loading" style="display:none;">⏳ กำลังอ่าน...</div>
    
    <!-- ฟอร์มแสดงข้อมูล -->
    <div id="result" class="card">
      <div class="form-group">
        <label>เลขบัตรประชาชน</label>
        <input type="text" id="idCardNumber" readonly />
      </div>
      
      <div class="form-group">
        <label>ชื่อ</label>
        <input type="text" id="firstName" readonly />
      </div>
      
      <div class="form-group">
        <label>นามสกุล</label>
        <input type="text" id="lastName" readonly />
      </div>
      
      <div class="form-group">
        <label>วันเกิด</label>
        <input type="text" id="birthDate" readonly />
      </div>
      
      <div class="form-group">
        <label>เพศ</label>
        <input type="text" id="gender" readonly />
      </div>
      
      <div class="form-group">
        <label>วันหมดอายุ</label>
        <input type="text" id="expiryDate" readonly />
      </div>
      
      <div class="form-group">
        <label>ที่อยู่</label>
        <textarea id="address" readonly rows="3"></textarea>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
