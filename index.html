<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>อ่านบัตรประชาชน</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>📇 อ่านบัตรประชาชน</h1>
    
    <div class="status-bar">
      <span id="statusText">✅ พร้อมใช้งาน</span>
    </div>
    
    <button id="readBtn" onclick="readCard()">
      📖 อ่านบัตร
    </button>
    
    <div id="loading" style="display:none;">
      <div class="spinner"></div>
      <p>กำลังอ่านข้อมูลบัตร...</p>
      <small>กรุณารอสักครู่</small>
    </div>
    
    <div id="result" class="card">
      <h3>📋 ข้อมูลบัตรประชาชน</h3>
      
      <div class="form-group">
        <label>เลขบัตรประชาชน</label>
        <input type="text" id="idCardNumber" readonly />
      </div>
      
      <div class="form-group">
        <label>ชื่อ</label>
        <input type="text" id="firstName" readonly />
      </div>
      
      <div class="form-group">
        <label>นามสกุล</label>
        <input type="text" id="lastName" readonly />
      </div>
      
      <div class="form-group">
        <label>วันเกิด</label>
        <input type="text" id="birthDate" readonly placeholder="DD/MM/YYYY" />
      </div>
      
      <div class="form-group">
        <label>เพศ</label>
        <input type="text" id="gender" readonly />
      </div>
      
      <div class="form-group">
        <label>วันหมดอายุ</label>
        <input type="text" id="expiryDate" readonly placeholder="DD/MM/YYYY" />
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
