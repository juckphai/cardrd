<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>อ่านบัตรประชาชน</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>📇 ระบบอ่านบัตรประชาชน</h1>
    <button id="readBtn" onclick="readCard()">📖 อ่านบัตร</button>
    <div id="loading" style="display:none;">กำลังอ่านข้อมูล...</div>
    <div id="result" class="card">
      <div class="row">
        <label>เลขบัตร:</label>
        <span id="idCardNumber">-</span>
      </div>
      <div class="row">
        <label>ชื่อ:</label>
        <span id="firstName">-</span>
      </div>
      <div class="row">
        <label>นามสกุล:</label>
        <span id="lastName">-</span>
      </div>
      <div class="row">
        <label>วันเกิด:</label>
        <span id="birthDate">-</span>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
